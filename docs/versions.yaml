# Each entry produces a docs subpath at /<name>/
# ref: git tag to build from (HEAD = current working tree for dev)
# display: label shown in the version dropdown
# default: true = root path redirects here (exactly one entry)
versions:
  - name: latest
    ref: v0.5.0
    display: v0.5 (latest)
    default: true
  - name: v0.4
    ref: v0.4.0
    display: v0.4
    default: false
  - name: dev
    ref: HEAD
    display: dev
    default: false
